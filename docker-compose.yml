services:
  atividade1:
    build:
      context: .
      args:
        APP: atividade1
    environment:
      BITCOIN_NETWORK: ${BITCOIN_NETWORK:-regtest}
      BITCOIN_RPC_CONNECT: host.docker.internal
      BITCOIN_RPC_PORT: ${BITCOIN_RPC_PORT:-18443}
      BITCOIN_RPC_USER: bitcoin
      BITCOIN_RPC_PASSWORD: bitcoin
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "8080:8080"

  atividade2:
    build:
      context: .
      args:
        APP: atividade2
    environment:
      BITCOIN_NETWORK: ${BITCOIN_NETWORK:-regtest}
      BITCOIN_RPC_CONNECT: host.docker.internal
      BITCOIN_RPC_PORT: ${BITCOIN_RPC_PORT:-18443}
      BITCOIN_RPC_USER: bitcoin
      BITCOIN_RPC_PASSWORD: bitcoin
      BITCOIN_ZMQ_BLOCK_ADDRESS: tcp://host.docker.internal:28332
      BITCOIN_ZMQ_TX_ADDRESS: tcp://host.docker.internal:28333
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "8081:8081"

  atividade3:
    build:
      context: .
      args:
        APP: atividade3
    environment:
      BITCOIN_NETWORK: ${BITCOIN_NETWORK:-regtest}
      BITCOIN_RPC_CONNECT: host.docker.internal
      BITCOIN_RPC_PORT: ${BITCOIN_RPC_PORT:-18443}
      BITCOIN_RPC_USER: bitcoin
      BITCOIN_RPC_PASSWORD: bitcoin
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - atividade3-data:/data
    ports:
      - "8082:8082"

  cloudflared:
    image: cloudflare/cloudflared:latest
    command: tunnel --no-autoupdate run --token ${CLOUDFLARE_TUNNEL_TOKEN:-}
    depends_on:
      - atividade1
      - atividade2
      - atividade3
    profiles:
      - tunnel

volumes:
  atividade3-data:
